<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SnapDrop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a35;
      --accent: #7c6bff;
      --accent2: #a78bfa;
      --text: #f0f0f5;
      --muted: #888899;
      --success: #4ade80;
      --danger: #f87171;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 400px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .panel {
      width: 100%;
      max-width: 400px;
      display: none;
    }
    .panel.active { display: flex; flex-direction: column; gap: 16px; }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: #1e1b2e;
    }
    .drop-zone.dragover .upload-icon-svg { transform: translateY(-6px); }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-zone h2 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .drop-zone p {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── Custom upload icon ── */
    .upload-icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .upload-icon-svg {
      width: 64px;
      height: 64px;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    /* Arrow bounce */
    @keyframes arrow-bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }
    .icon-arrow {
      animation: arrow-bounce 2s ease-in-out infinite;
      transform-origin: center;
    }

    /* Orbit ring pulse */
    @keyframes ring-pulse {
      0%, 100% { stroke-opacity: 0.25; r: 28; }
      50%       { stroke-opacity: 0.6;  r: 30; }
    }
    .icon-ring {
      animation: ring-pulse 2s ease-in-out infinite;
      transform-origin: 32px 32px;
    }

    /* Dashes rotate */
    @keyframes dash-spin {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -40; }
    }
    .icon-dashes {
      animation: dash-spin 4s linear infinite;
    }

    /* Progress */
    .progress-bar-wrap {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width 0.15s linear;
    }
    .progress-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      display: none;
    }

    /* Code display */
    .code-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      display: none;
    }
    .code-display .label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .code-display .code {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 10px;
      font-family: "SF Mono", "Fira Code", monospace;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
      user-select: all;
    }
    .code-display .file-info {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 10px;
    }
    .code-display .timer {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .copy-hint {
      font-size: 0.75rem;
      color: var(--accent2);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* Download panel */
    .code-inputs {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .code-inputs input {
      width: 52px;
      height: 64px;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 800;
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      caret-color: var(--accent);
    }
    .code-inputs input:focus { border-color: var(--accent); }
    .code-inputs input.filled { border-color: var(--accent2); }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b50d6);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .file-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: none;
      align-items: center;
      gap: 14px;
    }
    .file-preview .file-icon { font-size: 2rem; }
    .file-preview .file-details { flex: 1; min-width: 0; }
    .file-preview .file-name {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-preview .file-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    .status {
      text-align: center;
      font-size: 0.85rem;
      padding: 10px 16px;
      border-radius: 10px;
      display: none;
    }
    .status.error   { background: #2a1a1a; color: var(--danger);  border: 1px solid #5a2020; }
    .status.success { background: #142214; color: var(--success); border: 1px solid #1e4a1e; }

    .new-upload-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 12px;
      width: 100%;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .new-upload-btn:hover { border-color: var(--accent); color: var(--accent2); }

    @media (max-width: 380px) {
      .code-inputs input { width: 44px; height: 56px; font-size: 1.3rem; }
      .drop-zone { padding: 36px 16px; }
      .code-display .code { font-size: 2.6rem; letter-spacing: 8px; }
    }
  </style>
</head>
<body>

<header>
  <h1>SnapDrop</h1>
  <p>Share any file in seconds — no account, no network</p>
</header>

<div class="tabs">
  <button class="tab-btn active" id="tab-send" onclick="switchTab('send')">Send</button>
  <button class="tab-btn" id="tab-receive" onclick="switchTab('receive')">Receive</button>
</div>

<!-- SEND PANEL -->
<div class="panel active" id="panel-send">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" />
    <div class="upload-icon-wrap">
      <!-- Custom SVG upload icon -->
      <svg class="upload-icon-svg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer pulsing ring -->
        <circle class="icon-ring" cx="32" cy="32" r="28" stroke="#7c6bff" stroke-width="1.5"
          stroke-dasharray="6 4" stroke-linecap="round" class="icon-dashes" />
        <!-- Glow circle bg -->
        <circle cx="32" cy="32" r="22" fill="#1e1b2e" />
        <circle cx="32" cy="32" r="22" fill="url(#iconGrad)" fill-opacity="0.15" />
        <!-- Arrow group bouncing -->
        <g class="icon-arrow">
          <!-- Arrow shaft -->
          <line x1="32" y1="42" x2="32" y2="24" stroke="url(#iconGrad)" stroke-width="2.5"
            stroke-linecap="round" />
          <!-- Arrow head -->
          <polyline points="24,30 32,22 40,30" stroke="url(#iconGrad)" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </g>
        <!-- Base tray line -->
        <line x1="24" y1="44" x2="40" y2="44" stroke="#a78bfa" stroke-width="2"
          stroke-linecap="round" opacity="0.5" />
        <defs>
          <linearGradient id="iconGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#a78bfa" />
            <stop offset="1" stop-color="#7c6bff" />
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h2>Tap to choose a file</h2>
    <p>Or drag &amp; drop — any file type</p>
  </div>

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-label" id="progressLabel"></div>

  <div class="status" id="uploadStatus"></div>

  <div class="code-display" id="codeDisplay">
    <div class="label">Your share code</div>
    <div class="code" id="codeText" onclick="copyCode()" title="Tap to copy"></div>
    <div class="file-info" id="codeFileInfo"></div>
    <div class="timer" id="codeTimer"></div>
    <div class="copy-hint">Tap code to copy</div>
  </div>

  <button class="new-upload-btn" id="newUploadBtn" onclick="resetUpload()" style="display:none">
    + Upload another file
  </button>
</div>

<!-- RECEIVE PANEL -->
<div class="panel" id="panel-receive">
  <div class="code-inputs" id="codeInputs">
    <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
    <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
    <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
    <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
    <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
  </div>

  <div class="file-preview" id="filePreview">
    <div class="file-icon" id="previewIcon">📄</div>
    <div class="file-details">
      <div class="file-name" id="previewName"></div>
      <div class="file-meta" id="previewMeta"></div>
    </div>
  </div>

  <div class="status" id="receiveStatus"></div>

  <button class="btn btn-primary" id="downloadBtn" onclick="downloadFile()" disabled>
    Download
  </button>
</div>

<script>
  // ── Tab switching ──────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  // ── Send logic ─────────────────────────────────────────────────
  let expiryInterval = null;
  let currentCode = null;

  const fileInput = document.getElementById('fileInput');
  const dropZone  = document.getElementById('dropZone');

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) uploadFile(e.target.files[0]);
  });
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
  });

  function uploadFile(file) {
    dropZone.style.display = 'none';
    showUploadStatus('', '');

    const wrap  = document.getElementById('progressWrap');
    const bar   = document.getElementById('progressBar');
    const label = document.getElementById('progressLabel');
    wrap.style.display  = 'block';
    label.style.display = 'block';
    bar.style.width = '0%';

    const form = new FormData();
    form.append('file', file);

    // Use XHR so we get real upload progress events
    const xhr = new XMLHttpRequest();

    xhr.upload.addEventListener('progress', e => {
      if (!e.lengthComputable) return;
      const pct = Math.round((e.loaded / e.total) * 100);
      bar.style.width = pct + '%';
      label.textContent = `Uploading… ${pct}% of ${formatSize(file.size)}`;
    });

    xhr.addEventListener('load', () => {
      if (xhr.status < 200 || xhr.status >= 300) {
        onUploadError();
        return;
      }
      bar.style.width = '100%';
      label.textContent = 'Done!';
      setTimeout(() => {
        wrap.style.display  = 'none';
        label.style.display = 'none';
        bar.style.width = '0%';
      }, 400);

      const data = JSON.parse(xhr.responseText);
      currentCode = data.code;
      showCode(data.code, file.name, file.size, data.expires_in);
    });

    xhr.addEventListener('error', onUploadError);
    xhr.addEventListener('timeout', onUploadError);

    // No timeout — let large uploads finish naturally
    xhr.open('POST', '/upload');
    xhr.send(form);
  }

  function onUploadError() {
    document.getElementById('progressWrap').style.display  = 'none';
    document.getElementById('progressLabel').style.display = 'none';
    dropZone.style.display = '';
    fileInput.value = '';
    showUploadStatus('Upload failed — please try again.', 'error');
  }

  function showCode(code, filename, size, expiresIn) {
    document.getElementById('codeText').textContent = code;
    document.getElementById('codeFileInfo').textContent =
      `${filename} · ${formatSize(size)}`;

    document.getElementById('codeDisplay').style.display = 'block';
    document.getElementById('newUploadBtn').style.display = '';

    let remaining = expiresIn;
    updateTimer(remaining);
    if (expiryInterval) clearInterval(expiryInterval);
    expiryInterval = setInterval(() => {
      remaining--;
      updateTimer(remaining);
      if (remaining <= 0) { clearInterval(expiryInterval); resetUpload(); }
    }, 1000);
  }

  function updateTimer(s) {
    const m   = Math.floor(s / 60);
    const sec = s % 60;
    document.getElementById('codeTimer').textContent =
      `Expires in ${m}:${String(sec).padStart(2, '0')}`;
  }

  function copyCode() {
    if (!currentCode) return;
    navigator.clipboard.writeText(currentCode).then(() => {
      const hint = document.querySelector('.copy-hint');
      hint.textContent = 'Copied!';
      setTimeout(() => { hint.textContent = 'Tap code to copy'; }, 1500);
    });
  }

  function resetUpload() {
    if (expiryInterval) clearInterval(expiryInterval);
    currentCode = null;
    document.getElementById('codeDisplay').style.display  = 'none';
    document.getElementById('newUploadBtn').style.display = 'none';
    document.getElementById('uploadStatus').style.display = 'none';
    dropZone.style.display = '';
    fileInput.value = '';
  }

  function showUploadStatus(msg, type) {
    const el = document.getElementById('uploadStatus');
    if (!msg) { el.style.display = 'none'; return; }
    el.textContent = msg;
    el.className   = 'status ' + type;
    el.style.display = 'block';
  }

  // ── Receive logic ──────────────────────────────────────────────
  const inputs = Array.from(document.querySelectorAll('#codeInputs input'));
  let checkTimeout = null;

  function fillFromString(str) {
    const chars = str.replace(/\s/g, '').slice(0, 5).split('');
    chars.forEach((c, j) => {
      inputs[j].value = c;
      inputs[j].classList.toggle('filled', !!c);
    });
    inputs[Math.min(chars.length, 4)].focus();
    scheduleCheck();
  }

  inputs.forEach((input, i) => {
    input.addEventListener('input', e => {
      const val = e.target.value;
      // Multi-char means paste bypassed the paste handler (mobile IME etc)
      if (val.length > 1) {
        fillFromString(val);
        return;
      }
      input.value = val;
      input.classList.toggle('filled', !!val);
      if (val && i < 4) inputs[i + 1].focus();
      scheduleCheck();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !input.value && i > 0) {
        inputs[i - 1].value = '';
        inputs[i - 1].classList.remove('filled');
        inputs[i - 1].focus();
        scheduleCheck();
      }
    });

    input.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').trim();
      fillFromString(text);
    });
  });

  function getCode() { return inputs.map(i => i.value.slice(0, 1)).join(''); }

  function scheduleCheck() {
    clearTimeout(checkTimeout);
    const code = getCode();
    if (code.length < 5) {
      hideFilePreview();
      setReceiveStatus('', '');
      document.getElementById('downloadBtn').disabled = true;
      return;
    }
    checkTimeout = setTimeout(() => checkCode(code), 300);
  }

  async function checkCode(code) {
    setReceiveStatus('Checking…', '');
    try {
      const res = await fetch('/check/' + code);
      if (!res.ok) {
        hideFilePreview();
        setReceiveStatus('Code not found or expired.', 'error');
        document.getElementById('downloadBtn').disabled = true;
        return;
      }
      const data = await res.json();
      showFilePreview(data.filename, data.size_kb, data.expires_in);
      setReceiveStatus('', '');
      document.getElementById('downloadBtn').disabled = false;
    } catch {
      setReceiveStatus('Network error — try again.', 'error');
    }
  }

  function showFilePreview(filename, sizeKb, expiresIn) {
    document.getElementById('previewIcon').textContent = fileEmoji(filename);
    document.getElementById('previewName').textContent = filename;
    const m = Math.floor(expiresIn / 60);
    const s = expiresIn % 60;
    document.getElementById('previewMeta').textContent =
      `${sizeKb} KB · expires in ${m}:${String(s).padStart(2, '0')}`;
    document.getElementById('filePreview').style.display = 'flex';
  }

  function hideFilePreview() {
    document.getElementById('filePreview').style.display = 'none';
  }

  function setReceiveStatus(msg, type) {
    const el = document.getElementById('receiveStatus');
    if (!msg) { el.style.display = 'none'; return; }
    el.textContent = msg;
    el.className   = 'status ' + (type || '');
    el.style.display = 'block';
  }

  function downloadFile() {
    const code = getCode();
    if (code.length !== 5) return;
    window.location.href = '/download/' + code;
  }

  // ── Helpers ────────────────────────────────────────────────────
  function formatSize(bytes) {
    if (bytes < 1024)            return bytes + ' B';
    if (bytes < 1024 * 1024)     return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1024 ** 3)       return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    return (bytes / (1024 ** 3)).toFixed(2) + ' GB';
  }

  function fileEmoji(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = {
      jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', svg:'🖼️', heic:'🖼️',
      mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬', webm:'🎬',
      mp3:'🎵', wav:'🎵', flac:'🎵', aac:'🎵', m4a:'🎵',
      pdf:'📕', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📊', pptx:'📊',
      zip:'🗜️', tar:'🗜️', gz:'🗜️', rar:'🗜️', '7z':'🗜️',
      py:'🐍', js:'📜', ts:'📜', html:'🌐', css:'🎨',
      txt:'📄', md:'📄',
    };
    return map[ext] || '📦';
  }
</script>
</body>
</html>
