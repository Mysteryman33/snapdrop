<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SNAPDROP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #070709;
      --surface:      #0d0d0f;
      --border:       #1a1a1f;
      --border-hi:    #2a2a33;
      --green:        #00d68f;
      --green-dim:    #00432b;
      --green-bg:     #050f09;
      --text:         #b0b0bc;
      --text-hi:      #e4e4ee;
      --muted:        #3c3c48;
      --err:          #ff4d4d;
      --warn:         #f5a623;
      --font:         "SF Mono","Fira Code","Cascadia Code",Consolas,monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100dvh;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 64px;
    }

    /* ─── Header ───────────────────────────────────────────── */
    .hdr { text-align: center; margin-bottom: 40px; }

    .hdr-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--green);
      text-transform: uppercase;
    }

    .blink {
      display: inline-block;
      width: 9px; height: 1.1em;
      background: var(--green);
      vertical-align: middle;
      margin-left: 3px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .hdr-sub {
      margin-top: 6px;
      font-size: 0.67rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── Tabs ─────────────────────────────────────────────── */
    .tabs {
      display: flex;
      width: 100%;
      max-width: 480px;
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.67rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active     { background: var(--green); color: #000; font-weight: 700; }
    .tab-btn:not(.active):hover { color: var(--text-hi); background: var(--surface); }

    /* ─── Panels ────────────────────────────────────────────── */
    .panel { width: 100%; max-width: 480px; display: none; flex-direction: column; gap: 12px; }
    .panel.active { display: flex; }

    /* ─── Drop zone ─────────────────────────────────────────── */
    .drop-zone {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 52px 24px;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: var(--surface);
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: var(--green); background: var(--green-bg); }
    .drop-zone:hover .dz-icon path,
    .drop-zone:hover .dz-icon line,
    .drop-zone:hover .dz-icon polyline,
    .drop-zone.drag .dz-icon path,
    .drop-zone.drag .dz-icon line,
    .drop-zone.drag .dz-icon polyline { stroke: var(--green); }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    /* SVG upload icon */
    .dz-icon { margin-bottom: 20px; }
    .dz-icon path, .dz-icon line, .dz-icon polyline {
      stroke: var(--muted);
      transition: stroke .2s;
    }

    /* Arrow bounce */
    @keyframes arrowBounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    .dz-arrow { animation: arrowBounce 2.4s ease-in-out infinite; transform-origin: 24px 24px; }

    .dz-title {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-hi);
      margin-bottom: 6px;
    }
    .dz-sub { font-size: 0.67rem; color: var(--muted); letter-spacing: 1px; }
    .dz-prompt { display: block; margin-top: 14px; font-size: 0.67rem; color: var(--green); letter-spacing: 1px; }

    /* ─── Terminal log ──────────────────────────────────────── */
    .log-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 16px;
      display: none;
      flex-direction: column;
      gap: 2px;
      min-height: 72px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-box::-webkit-scrollbar { width: 3px; }
    .log-box::-webkit-scrollbar-thumb { background: var(--border-hi); }

    .ll {
      font-size: 0.7rem;
      opacity: 0;
      transform: translateY(3px);
      animation: llIn .12s forwards;
      white-space: pre;
    }
    @keyframes llIn { to { opacity:1; transform:none; } }
    .ll::before { content: '$ '; color: var(--muted); }
    .ll-g  { color: var(--green); }
    .ll-hi { color: var(--text-hi); }
    .ll-m  { color: var(--muted); }
    .ll-e  { color: var(--err); }

    /* ─── Code block ────────────────────────────────────────── */
    .code-block {
      border: 1px solid var(--border-hi);
      border-radius: 3px;
      padding: 22px;
      background: var(--surface);
      display: none;
      flex-direction: column;
      gap: 18px;
    }

    .cb-label {
      font-size: 0.62rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Code chars */
    .code-chars { display: flex; gap: 8px; justify-content: center; }
    .cc {
      width: 56px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.65rem; font-weight: 700;
      color: var(--green);
      border: 1px solid var(--green-dim);
      border-radius: 3px;
      background: var(--green-bg);
      opacity: 0; transform: scale(0.88);
      transition: opacity .2s, transform .2s;
    }
    .cc.on { opacity: 1; transform: none; }

    /* Link row */
    .link-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 9px 12px;
    }
    .link-url {
      flex: 1;
      font-size: 0.67rem;
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .copy-btn {
      font-family: var(--font);
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border-hi);
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
    }
    .copy-btn:hover, .copy-btn.ok { border-color: var(--green); color: var(--green); }

    /* QR */
    .qr-section { text-align: center; }
    .qr-lbl {
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .qr-wrap {
      display: inline-block;
      background: #fff;
      padding: 10px;
      border-radius: 3px;
    }
    .qr-wrap img, .qr-wrap canvas { display: block; }

    /* Meta row */
    .cb-meta {
      display: flex; justify-content: space-between;
      font-size: 0.65rem; color: var(--muted);
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .cb-timer { color: var(--warn); }

    /* ─── Buttons ───────────────────────────────────────────── */
    .btn {
      font-family: var(--font);
      font-size: 0.7rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border-radius: 3px;
      padding: 13px 20px;
      cursor: pointer;
      width: 100%;
      transition: all .15s;
    }
    .btn-g {
      background: var(--green);
      border: 1px solid var(--green);
      color: #000; font-weight: 700;
    }
    .btn-g:hover:not(:disabled) { background: #00f5a3; border-color: #00f5a3; }
    .btn-g:disabled { opacity: .3; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-hi);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }

    /* ─── Receive panel ─────────────────────────────────────── */
    .recv-prompt {
      font-size: 0.65rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
    }
    .recv-prompt::before { content: '$ '; }

    .code-inputs { display: flex; gap: 8px; justify-content: center; }
    .code-inputs input {
      width: 56px; height: 66px;
      text-align: center;
      font-size: 1.6rem; font-weight: 700;
      font-family: var(--font);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--green);
      outline: none;
      caret-color: var(--green);
      transition: border-color .15s;
      letter-spacing: 0;
    }
    .code-inputs input:focus { border-color: var(--green-dim); }
    .code-inputs input.ok    { border-color: var(--green); background: var(--green-bg); }

    .recv-status {
      font-size: 0.7rem;
      padding: 10px 14px;
      border-radius: 3px;
      border: 1px solid;
      display: none;
    }
    .recv-status::before { content: '$ '; color: var(--muted); }
    .rs-check { color: var(--muted);  border-color: var(--border);    background: var(--surface); }
    .rs-ok    { color: var(--green);  border-color: var(--green-dim); background: var(--green-bg); }
    .rs-err   { color: var(--err);    border-color: #3a1010;          background: #100505; }

    .file-found {
      border: 1px solid var(--border-hi);
      border-radius: 3px;
      background: var(--surface);
      padding: 14px 16px;
      display: none;
      flex-direction: column;
      gap: 5px;
    }
    .ff-row { font-size: 0.7rem; }
    .ff-row .k { color: var(--muted); display: inline-block; width: 64px; }
    .ff-row .v { color: var(--text-hi); }

    /* Divider */
    .or {
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 3px;
      color: var(--muted);
      position: relative;
    }
    .or::before, .or::after {
      content: '';
      position: absolute; top: 50%;
      width: 42%; height: 1px;
      background: var(--border);
    }
    .or::before { left: 0; }
    .or::after  { right: 0; }

    /* App QR */
    .app-qr { text-align: center; }
    .app-qr .qr-lbl { margin-bottom: 12px; }

    @media (max-width: 380px) {
      .cc, .code-inputs input { width: 46px; height: 54px; font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-title">SNAPDROP<span class="blink"></span></div>
  <div class="hdr-sub">cross-device file transfer</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" id="tab-send"    onclick="switchTab('send')">▶ SEND</button>
  <button class="tab-btn"        id="tab-receive" onclick="switchTab('receive')">▼ RECEIVE</button>
</div>

<!-- ── SEND panel ─────────────────────────────────────────── -->
<div class="panel active" id="panel-send">

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" />
    <div class="dz-icon">
      <svg width="52" height="52" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- outer frame -->
        <rect x="1" y="1" width="46" height="46" rx="2"
          stroke-width="1" />
        <!-- bouncing arrow group -->
        <g class="dz-arrow">
          <line x1="24" y1="35" x2="24" y2="15" stroke-width="1.8" stroke-linecap="round"/>
          <polyline points="15,23 24,14 33,23" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>
        <!-- tray -->
        <line x1="15" y1="37" x2="33" y2="37" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="dz-title">Drop file here</div>
    <div class="dz-sub">or click to browse</div>
    <span class="dz-prompt">any file · any size_</span>
  </div>

  <div class="log-box" id="logBox"></div>

  <div class="code-block" id="codeBlock">
    <div class="cb-label">transfer code</div>

    <div class="code-chars">
      <div class="cc" id="cc0"></div>
      <div class="cc" id="cc1"></div>
      <div class="cc" id="cc2"></div>
      <div class="cc" id="cc3"></div>
      <div class="cc" id="cc4"></div>
    </div>

    <div class="link-row">
      <div class="link-url" id="linkUrl"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">COPY</button>
    </div>

    <div class="qr-section">
      <div class="qr-lbl">scan to receive on another device</div>
      <div class="qr-wrap"><div id="uploadQR"></div></div>
    </div>

    <div class="cb-meta">
      <span id="metaFile"></span>
      <span class="cb-timer" id="metaTimer"></span>
    </div>
  </div>

  <button class="btn btn-ghost" id="newBtn" onclick="resetUpload()" style="display:none">
    + NEW UPLOAD
  </button>
</div>

<!-- ── RECEIVE panel ──────────────────────────────────────── -->
<div class="panel" id="panel-receive">

  <div>
    <div class="recv-prompt">enter transfer code_</div>
    <div class="code-inputs" id="codeInputs">
      <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
      <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
      <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
      <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
      <input maxlength="1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text" />
    </div>
  </div>

  <div class="recv-status" id="recvStatus"></div>

  <div class="file-found" id="fileFound">
    <div class="ff-row"><span class="k">file</span><span class="v" id="ffName"></span></div>
    <div class="ff-row"><span class="k">size</span><span class="v" id="ffSize"></span></div>
    <div class="ff-row"><span class="k">expires</span><span class="v" id="ffExpiry"></span></div>
  </div>

  <button class="btn btn-g" id="dlBtn" onclick="doDownload()" disabled>▼ DOWNLOAD</button>

  <div class="or">or</div>

  <div class="app-qr">
    <div class="qr-lbl">scan to open snapdrop on another device</div>
    <div class="qr-wrap"><div id="appQR"></div></div>
  </div>
</div>

<!-- QR lib then app script -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ── Tabs ───────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('panel-' + t).classList.add('active');
}

// ── Init ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // App-URL QR for receive tab
  makeQR('appQR', window.location.origin, 160);

  // Auto-fill code from ?code=
  const urlCode = new URLSearchParams(window.location.search).get('code');
  if (urlCode && urlCode.length === 5) {
    switchTab('receive');
    fillFromString(urlCode);
  }
});

function makeQR(elId, text, size) {
  document.getElementById(elId).innerHTML = '';
  return new QRCode(document.getElementById(elId), {
    text, width: size, height: size,
    colorDark: '#000000', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

// ── Log helpers ────────────────────────────────────────────
let logBox;
function initLog() {
  logBox = document.getElementById('logBox');
  logBox.style.display = 'flex';
  logBox.innerHTML = '';
}
function log(text, cls = '') {
  const d = document.createElement('div');
  d.className = 'll ' + cls;
  d.textContent = text;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
  return d;
}

// ── Send ───────────────────────────────────────────────────
let expiryTick = null, currentCode = null;

const fileInput = document.getElementById('fileInput');
const dropZone  = document.getElementById('dropZone');

fileInput.addEventListener('change', e => { if (e.target.files[0]) doUpload(e.target.files[0]); });
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
});

function doUpload(file) {
  dropZone.style.display = 'none';
  initLog();
  log('initiating transfer...', 'll-m');
  log(`file: ${file.name} (${fmtSize(file.size)})`, 'll-hi');

  const form = new FormData();
  form.append('file', file);

  const xhr = new XMLHttpRequest();
  let lastL = 0, lastT = Date.now(), speeds = [], progLine = null;

  xhr.upload.addEventListener('progress', e => {
    if (!e.lengthComputable) return;
    const now = Date.now(), dt = (now - lastT) / 1000;
    if (dt > 0.25) {
      speeds.push((e.loaded - lastL) / dt);
      if (speeds.length > 6) speeds.shift();
      lastL = e.loaded; lastT = now;
    }
    const avg = speeds.length ? speeds.reduce((a, b) => a + b) / speeds.length : 0;
    const pct = Math.round(e.loaded / e.total * 100);
    const filled = Math.round(pct / 5);
    const bar = '█'.repeat(filled) + '░'.repeat(20 - filled);
    const eta = avg > 0 ? fmtEta((e.total - e.loaded) / avg) : '--';
    const txt = `[${bar}] ${String(pct).padStart(3)}%  ${fmtSize(avg)}/s · eta ${eta}`;
    if (!progLine) progLine = log(txt, 'll-g');
    else progLine.textContent = txt;
  });

  xhr.addEventListener('load', () => {
    if (xhr.status < 200 || xhr.status >= 300) { uploadErr(); return; }
    if (progLine) progLine.textContent = `[${'█'.repeat(20)}] 100%  done`;
    log('transfer complete ✓', 'll-g');
    const data = JSON.parse(xhr.responseText);
    currentCode = data.code;
    setTimeout(() => showCode(data.code, file.name, file.size, data.expires_in), 350);
  });

  xhr.addEventListener('error', uploadErr);
  xhr.addEventListener('timeout', uploadErr);
  xhr.open('POST', '/upload');
  xhr.send(form);
}

function uploadErr() {
  log('upload failed — please try again', 'll-e');
  dropZone.style.display = ''; fileInput.value = '';
}

function showCode(code, filename, size, expiresIn) {
  const block = document.getElementById('codeBlock');
  block.style.display = 'flex';
  document.getElementById('newBtn').style.display = '';

  // Stagger chars
  code.split('').forEach((ch, i) => {
    setTimeout(() => {
      const el = document.getElementById('cc' + i);
      el.textContent = ch;
      el.classList.add('on');
    }, i * 90);
  });

  // Link + QR
  const shareURL = `${window.location.origin}/?code=${code}`;
  document.getElementById('linkUrl').textContent = shareURL;
  setTimeout(() => makeQR('uploadQR', shareURL, 180), code.length * 90 + 100);

  // Meta
  document.getElementById('metaFile').textContent = `${filename} · ${fmtSize(size)}`;

  // Countdown
  let rem = expiresIn;
  tickTimer(rem);
  if (expiryTick) clearInterval(expiryTick);
  expiryTick = setInterval(() => { rem--; tickTimer(rem); if (rem <= 0) { clearInterval(expiryTick); resetUpload(); } }, 1000);
}

function tickTimer(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  document.getElementById('metaTimer').textContent = `expires ${m}:${String(sec).padStart(2,'0')}`;
}

function copyLink() {
  const url = document.getElementById('linkUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'COPIED'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('ok'); }, 1800);
  });
}

function resetUpload() {
  if (expiryTick) clearInterval(expiryTick);
  currentCode = null;
  document.getElementById('codeBlock').style.display = 'none';
  document.getElementById('logBox').style.display    = 'none';
  document.getElementById('newBtn').style.display    = 'none';
  document.getElementById('uploadQR').innerHTML = '';
  [0,1,2,3,4].forEach(i => {
    const el = document.getElementById('cc' + i);
    el.textContent = ''; el.classList.remove('on');
  });
  dropZone.style.display = ''; fileInput.value = '';
}

// ── Receive ────────────────────────────────────────────────
const inputs = Array.from(document.querySelectorAll('#codeInputs input'));
let checkTmr = null;

function fillFromString(str) {
  const chars = str.replace(/\s/g, '').slice(0, 5).split('');
  chars.forEach((c, j) => {
    if (!inputs[j]) return;
    inputs[j].value = c;
    inputs[j].classList.toggle('ok', !!c);
  });
  const focus = Math.min(chars.length, 4);
  if (inputs[focus]) inputs[focus].focus();
  scheduleCheck();
}

inputs.forEach((inp, i) => {
  inp.addEventListener('input', e => {
    const v = e.target.value;
    if (v.length > 1) { fillFromString(v); return; }
    inp.value = v;
    inp.classList.toggle('ok', !!v);
    if (v && i < 4) inputs[i + 1].focus();
    scheduleCheck();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) {
      inputs[i-1].value = ''; inputs[i-1].classList.remove('ok');
      inputs[i-1].focus(); scheduleCheck();
    }
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    fillFromString((e.clipboardData || window.clipboardData).getData('text').trim());
  });
});

function getCode() { return inputs.map(i => i.value.slice(0,1)).join(''); }

function scheduleCheck() {
  clearTimeout(checkTmr);
  const code = getCode();
  if (code.length < 5) {
    setRS('', ''); document.getElementById('fileFound').style.display = 'none';
    document.getElementById('dlBtn').disabled = true; return;
  }
  setRS('checking...', 'rs-check');
  checkTmr = setTimeout(() => checkCode(code), 350);
}

async function checkCode(code) {
  try {
    const res = await fetch('/check/' + code);
    if (!res.ok) {
      setRS('code not found or expired', 'rs-err');
      document.getElementById('fileFound').style.display = 'none';
      document.getElementById('dlBtn').disabled = true; return;
    }
    const d = await res.json();
    setRS('', '');
    showFound(d);
    document.getElementById('dlBtn').disabled = false;
  } catch { setRS('network error — check connection', 'rs-err'); }
}

function showFound(d) {
  const m = Math.floor(d.expires_in / 60), s = d.expires_in % 60;
  document.getElementById('ffName').textContent   = d.filename;
  document.getElementById('ffSize').textContent   = fmtSize(d.size);
  document.getElementById('ffExpiry').textContent = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('fileFound').style.display = 'flex';
}

function setRS(msg, cls) {
  const el = document.getElementById('recvStatus');
  if (!msg) { el.style.display = 'none'; return; }
  el.textContent = msg; el.className = 'recv-status ' + cls; el.style.display = 'block';
}

function doDownload() {
  const code = getCode();
  if (code.length === 5) window.location.href = '/download/' + code;
}

// ── Helpers ────────────────────────────────────────────────
function fmtSize(b) {
  if (b < 1024)      return b + ' B';
  if (b < 1024**2)   return (b/1024).toFixed(1) + ' KB';
  if (b < 1024**3)   return (b/1024**2).toFixed(1) + ' MB';
  return (b/1024**3).toFixed(2) + ' GB';
}
function fmtEta(s) {
  if (s < 60) return Math.round(s) + 's';
  return Math.floor(s/60) + 'm ' + Math.round(s%60) + 's';
}
</script>
